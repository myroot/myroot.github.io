<!doctype html>
<html>
<head>
  <title>getusermedia popup test</title>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, minimum-scale=1.0, initial-scale=1.0">
</head>
<body>
<script>

function doTest() {
  navigator.getUserMedia = navigator.getUserMedia ||
                           navigator.webkitGetUserMedia ||
                           navigator.mozGetUserMedia;

  if(!navigator.getUserMedia) {
    console.log('browser does not support getUserMedia');
    alert('browser does not support getUserMedia');
    return;
  }
  navigator.getUserMedia({ audio: true },
    function(stream) {
      console.log('getting stream : ' + stream);
      alert('successfuly getting stream :' + stream);
    },
    function(err) {
      console.log("The following error occured: " + err.name);
      alert("The following error occured: " + err.name);
    });
  console.log('request the getUserMedia');
}
</script>
<center>
<button onclick="doTest()"> Get usermedia </button>
<button onclick="history.back(1)"> back </button>
</center>
</body>
</html>

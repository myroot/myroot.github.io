<html>
<head>
  <title> Fullscreen </title>
  <style>
* {
    font-family: Verdana, Lucida Sans, Arial, Helvetica, sans-serif;
}

body {
    margin: 0px auto;
    background-color:#222;
}

.contents {
    display: flex;
    display: -webkit-flex;
    box-sizing: border-box;
    -webkit-box-sizing: border-box;
    height:320px;
}

.red {
  background-color:red;
}

.blue {
  background-color:blue;
}


.content_text {
    font-weight:bold;
    font-size:5em;
    color:#fff;
}
</style>
  
<script>
function toggleFullScreen(target) {
  if (!document.fullscreenElement &&    // alternative standard method
      !document.mozFullScreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement ) {  // current working methods
    if (target.requestFullscreen) {
      target.requestFullscreen();
    } else if (target.msRequestFullscreen) {
      target.msRequestFullscreen();
    } else if (target.mozRequestFullScreen) {
      target.mozRequestFullScreen();
    } else if (target.webkitRequestFullscreen) {
      target.webkitRequestFullscreen(Element.ALLOW_KEYBOARD_INPUT);
    } else {
      console.log('dose not support fullscreen API');
    }
  } else {
    if (document.exitFullscreen) {
      document.exitFullscreen();
    } else if (document.msExitFullscreen) {
      document.msExitFullscreen();
    } else if (document.mozCancelFullScreen) {
      document.mozCancelFullScreen();
    } else if (document.webkitExitFullscreen) {
      document.webkitExitFullscreen();
    } else {
      console.log('dose not support fullscreen API');
    }
  }
}

function request() {
  toggleFullScreen();
}

function lock() {
  if (screen.lockOrientation) {
    screen.lockOrientation('portrait');
  } else if (screen.orientation.lock) {
    screen.orientation.lock('portrait');
  } else {
    console.log("does not support orientation lock API");
  }
}

function unlock() {
  if (screen.unlockOrientation) {
    screen.unlockOrientation();
  } else if (screen.orientation.unlock) {
    screen.orientation.unlock();
  } else {
    console.log("does not support orientation lock API");
  }
}

</script>
  
</head>
<body>
  
  
  <div class='contents red'>
    <div style='margin:auto;' onclick=toggleFullScreen(this)>
        <span class=content_text id=textbox>Red</span>
    </div>
  </div>
  
  <div class='contents blue'>
    <div style='margin:auto;' onclick=toggleFullScreen(this)>
        <span class=content_text id=textbox>Blue</span>
    </div>
  </div>
<button onclick="request()"> request </button>
<button onclick="lock()"> lock </button>
<button onclick="unlock()"> unlock </button>

</body>
</html>

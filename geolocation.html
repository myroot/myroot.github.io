<!doctype html>
<html>
<head>
  <title>Geolocation popup test</title>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, minimum-scale=1.0, initial-scale=1.0">
  <style>
    body {
      background-color:white;
    }
  </style>
</head>
<body>
<script>

function doTest() {
  if(!navigator.geolocation) {
    console.log('browser does not support geolocation');
    alert('browser does not support geolocation');
    return;
  }
  navigator.geolocation.getCurrentPosition(function(pos) {
    console.log('get current position :' + pos.coords);
    alert('get current position successfully :'+pos.coords);
  }, function(err) {
    console.log('fail to get current position :' + err.code +' (' + err.message + ')');
    alert('fail to get current position :'+err.message);
  });
  console.log('request the current position');
}
</script>
<center>
<button onclick="doTest()"> Get current position </button>
<button onclick="history.back(1)"> back </button>
</center>
</body>
</html>
